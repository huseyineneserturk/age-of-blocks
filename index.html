<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age of Blocks — War Fronts</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="hud">
      <div id="top-bar">
        <span id="civ-badge" title=""><span class="cb-emblem">🦅</span><span class="cb-name">—</span></span>
        <span class="res gold"><span class="res-ic">🪙</span><b id="gold">0</b><small id="income"></small></span>
        <span class="res supply"><span class="res-ic">👥</span><b id="supply">0/0</b></span>
        <span id="selection-info">Birim seçilmedi</span>
        <span id="fps"></span>
      </div>

      <!-- Minimap -->
      <canvas id="minimap"></canvas>

      <!-- Build menu (bottom-left) -->
      <div id="build-menu"></div>

      <!-- Selected building panel (bottom-right) -->
      <div id="building-panel" class="hidden">
        <div id="bp-title">Bina</div>
        <div id="bp-trains"></div>
        <div id="bp-queue"></div>
        <div id="bp-hint"></div>
      </div>

      <div id="hint-bar">
        Sol tık / sürükle: <b>seç</b> · Sağ tık: <b>yürüt / saldır</b> · <b>A</b>: saldırı emri · WASD / orta tuş: <b>kamera</b> · Tekerlek: <b>zoom</b>
      </div>

      <!-- Research -->
      <button id="research-fab" class="hidden">🔬<span id="research-badge">0</span></button>
      <div id="research-modal" class="hidden">
        <div class="research-box">
          <h3>🔬 Araştırma</h3>
          <p class="research-sub">Bir geliştirme seç</p>
          <div id="research-choices"></div>
          <button id="research-close">Sonra</button>
        </div>
      </div>

      <!-- Game over -->
      <div id="gameover" class="hidden">
        <h1 id="go-title">Zafer!</h1>
        <button id="go-restart">Tekrar Oyna</button>
      </div>
    </div>

    <!-- Main menu -->
    <div id="main-menu">
      <canvas id="menu-scene"></canvas>

      <!-- Top bar: online count · language · music -->
      <div class="mm-topbar">
        <div class="mm-online" id="mm-online" title="">
          <span class="mm-dot"></span><span id="mm-online-text">—</span>
        </div>
        <div class="mm-lang" id="mm-lang">
          <button class="mm-lang-btn" data-lang="tr">TR</button>
          <button class="mm-lang-btn" data-lang="en">EN</button>
        </div>
        <button id="mm-music" title="">♪</button>
      </div>

      <div class="mm-frame">
        <div class="mm-crest">⚔</div>
        <h1 class="mm-title">AGE OF BLOCKS</h1>
        <div class="mm-tagline">WAR FRONTS</div>
        <p class="mm-sub" data-i18n="menu.sub"></p>

        <section class="mm-section">
          <div class="mm-label" data-i18n="menu.chooseCiv"></div>
          <div class="mm-civs" id="mm-civs"></div>
          <p class="mm-civ-bonus" id="mm-civ-bonus"></p>
        </section>

        <div class="mm-cols">
          <!-- Single player -->
          <section class="mm-col">
            <div class="mm-label" data-i18n="menu.campaign"></div>
            <div class="mm-diff" id="mm-diff">
              <button class="mm-diff-btn" data-diff="easy" data-i18n="diff.easy"></button>
              <button class="mm-diff-btn active" data-diff="normal" data-i18n="diff.normal"></button>
              <button class="mm-diff-btn" data-diff="hard" data-i18n="diff.hard"></button>
            </div>
            <button id="mm-start" data-i18n="menu.start"></button>
          </section>

          <!-- Multiplayer lobby -->
          <section class="mm-col">
            <div class="mm-label" data-i18n="menu.front"></div>
            <div class="mm-lobby">
              <div class="mm-lobby-head">
                <span data-i18n="menu.openRooms"></span>
                <button id="mm-refresh" class="mm-mini-btn" data-i18n="menu.refresh"></button>
              </div>
              <div class="mm-room-list" id="mm-room-list"></div>
              <button id="mm-create" class="mm-mp-btn" data-i18n="menu.createRoom"></button>
            </div>
            <p id="mm-status" class="mm-status hidden"></p>
          </section>
        </div>
      </div>

      <audio id="menu-music" src="/audio/menu-theme.mp3" loop preload="auto"></audio>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
